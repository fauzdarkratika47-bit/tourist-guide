body {

.header {
    background:#003d59;
    color: white;
    padding: 15px;
    text-align: center;
}

/* Search */
.search-box {
    text-align: center;
    margin: 20px;
    position: relative;
}

.search-box input {
    border-radius: 5px;
    border: 1px solid #ccc;
}

.search-box input, select {
    padding: 10px;
    margin: 5px;
    width: 200px;
}

/* Suggestions */
#suggestions {
    position: absolute;
    background: white;
    width: 200px;
    left: 50%;
    transform: translateX(-50%);
    border: 1px solid #ccc;
    display: none;
    z-index: 1000;
}


#suggestions div {
    padding: 8px;
    cursor: pointer;
}

#suggestions div:hover {
    background: #eee;
}

/* Cards */
.container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

.card {
    background:#003d59;
    width: 410px;
    margin: 15px;
    border-radius: 10px;
    box-shadow: 0px 2px 10px whitesmoke;
    overflow: hidden;
    transition: 0.3s;
    display: inline-block;
    color: white;

    }



.card:hover {
    transform: scale(1.05);
}

.card img {
    width: 100%;
    height: 250px;
}

.card h3, .card p {
    padding: 10px;
    color: white;
}

/* Rating */
.stars {
    color: gold;
    padding: 0 10px 10px;
    cursor: pointer;
}

/* Map */
.map {
    margin: 30px;
    text-align: center;
}
  /* new add  */



@media (max-width: 768px) {

    .search-box input, select {
        width: 90%;
    }

    .card {
        width: 90%;
    }

    .container {
        flex-direction: column;
        align-items: center;
    }

    iframe {
        width: 100%;
        height: 250px;
    }
}


</style>

let searchInput = document.getElementById("searchInput");
let filter = document.getElementById("filter");
let results = document.getElementById("results");
let suggestions = document.getElementById("suggestions");

searchInput.addEventListener("keyup", showResults);

function showResults() {
    let value = searchInput.value.toLowerCase();
    let filterValue = filter.value;

    results.innerHTML = "";
    suggestions.innerHTML = "";

    let filtered = data.filter(item => 
        (filterValue === "all" || item.type === filterValue) &&
        item.name.toLowerCase().includes(value)
    );

    // Suggestions
    filtered.slice(0,5).forEach(item => {
        let div = document.createElement("div");
        div.textContent = item.name;
        div.onclick = () => {
            searchInput.value = item.name;
            suggestions.innerHTML = "";
            showResults();
        };
        suggestions.appendChild(div);
    });

    // Cards
    filtered.forEach((item, index) => {
        let stars = "⭐".repeat(Math.floor(item.rating));

        let card = `
        <div class="card" onclick="openDetail(${index})">
            <img src="${item.img}">
            <h3>${item.name}</h3>
            <p>${item.desc}</p>
            <div class="stars">${stars}</div>
        </div>
        `;
        results.innerHTML += card;
    });
}

// Detail page open
function openDetail(index) {
    let item = data[index];
    localStorage.setItem("selectedItem", JSON.stringify(item));
    window.location.href = "detail.html";
}
showResults();
