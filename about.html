    <link rel="stylesheet" href="css/style.css">
    <style>

        
/* About Section */
.about {
  padding: 60px 20px;
  text-align: center;
}

.about h2 {
  font-size: 36px;
  /* margin-bottom: 40px; */
  margin-top: 50px;
  color: #0b4c61;
}

/* Team Container */
.team-container {
  display: flex;
  justify-content: center;
  gap: 30px;
  flex-wrap: wrap;
}

/* Member Card */
.member {
  background-image: linear-gradient(to right top, #c3def6, #cfdef2, #d9deed, #dfe0e7, #e2e2e2);
  padding: 20px;
  width: 220px;
  border-radius: 20px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.1);
  transition: all 0.3s ease;
}

/* Hover Effect */
.member:hover {
  transform: translateY(-10px) scale(1.05);
}

/* Member Image */
.member img {
  width: 150px;
  height: 150px;
  border-radius: 50%;   /* circle image 🔥 */
  object-fit: cover;
  margin-bottom: 15px;
  border: 4px solid #0b4c61;
}

/* Name */
.member h3 {
  margin: 10px 0 5px;
  color: #333;
  font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
  font-size: 20px;
}

/* Role */
.member p {
  color: gray;
  font-size: 14px;
}

    /* Footer Styling */
.footer {
  background-color: #0b4c61;
  color: white;
  text-align: center;
  padding: 20px 10px;
  margin-top: 50px;
}

.footer p {
  margin: 5px 0;
  font-size: 14px;
}

/* Sticky footer (page ke niche chipka rahe) */
body {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  }

footer {
  margin-top: auto;
}
    </style>
</head>
